# 自动回复 Issue | Auto-reply to Issues
# 当新 Issue 被创建时，自动发送中英双语欢迎消息，并根据标题前缀添加标签
# When a new Issue is created, automatically send a bilingual welcome message and add labels based on title prefix

name: Issue Welcome Reply

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = context.payload.issue.title;
            const isBugReport = issueTitle.startsWith('[错误]');
            const isFeatureRequest = issueTitle.startsWith('[建议]');
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            // --- Bot→人类 动态用户解析 | Dynamic bot-to-human user resolution ---
            let botMapping = {};
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/bot-user-mapping.json'
              });
              botMapping = JSON.parse(Buffer.from(data.content, 'base64').toString());
            } catch (e) {}

            async function resolveUser(login, type, resource) {
              if (type !== 'Bot' && !login.endsWith('[bot]')) return login;
              if (resource) {
                try {
                  const refs = [...(resource.body || '').matchAll(/#(\d+)/g)].map(m => +m[1]);
                  for (const num of refs) {
                    const { data: events } = await github.rest.issues.listEvents({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    const evt = events.findLast(e =>
                      e.event === 'assigned' && e.assignee?.login?.endsWith('[bot]')
                    );
                    if (evt?.actor && evt.actor.type !== 'Bot') return evt.actor.login;
                    const { data: linked } = await github.rest.issues.get({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    if (linked.user.type !== 'Bot') return linked.user.login;
                  }
                } catch (e) {}
                const ha = (resource.assignees || []).find(a => a.type !== 'Bot' && !a.login.endsWith('[bot]'));
                if (ha) return ha.login;
                if (resource.requested_reviewers) {
                  const hr = resource.requested_reviewers.find(r => r.type !== 'Bot' && !r.login.endsWith('[bot]'));
                  if (hr) return hr.login;
                }
              }
              return botMapping[login] || context.repo.owner;
            }
            // --- 解析结束 | End resolution ---

            const issue = context.payload.issue;
            const issueAuthor = await resolveUser(issue.user.login, issue.user.type, issue);
            const lines = [];

            if (isBugReport) {
              lines.push(
                `👋 你好 @${issueAuthor}，感谢你提交了这个错误报告！`,
                '',
                '我们会尽快审查你报告的问题。在此期间，你可以参考以下资源：',
                '',
                `- 📖 [贡献指南](${repoUrl}/blob/main/CONTRIBUTING.md) — 了解项目规范`,
                `- 📋 [课程内容规范](${repoUrl}/blob/main/AGENTS.MD) — 查看课程质量标准`,
                '',
                '如果你有兴趣自己修复这个问题，欢迎直接提交 Pull Request！',
                '',
                '---',
                '',
                `👋 Hi @${issueAuthor}, thank you for submitting this bug report!`,
                '',
                'We will review the reported issue as soon as possible. In the meantime, you may find these resources helpful:',
                '',
                `- 📖 [Contributing Guide](${repoUrl}/blob/main/CONTRIBUTING.md) — Learn about project conventions`,
                `- 📋 [Content Standards](${repoUrl}/blob/main/AGENTS.MD) — Review course quality standards`,
                '',
                "If you're interested in fixing this issue yourself, feel free to submit a Pull Request!"
              );
            } else if (isFeatureRequest) {
              lines.push(
                `👋 你好 @${issueAuthor}，感谢你提出了这个改进建议！`,
                '',
                '我们非常重视来自学习者和贡献者的反馈。维护者会尽快审查你的建议。',
                '',
                `- 📖 [贡献指南](${repoUrl}/blob/main/CONTRIBUTING.md) — 了解如何参与贡献`,
                `- 📋 [课程内容规范](${repoUrl}/blob/main/AGENTS.MD) — 查看课程体系结构和规范`,
                '',
                '如果你愿意自己实现这个建议，欢迎提交 Pull Request！',
                '',
                '---',
                '',
                `👋 Hi @${issueAuthor}, thank you for your improvement suggestion!`,
                '',
                'We greatly value feedback from learners and contributors. Maintainers will review your suggestion as soon as possible.',
                '',
                `- 📖 [Contributing Guide](${repoUrl}/blob/main/CONTRIBUTING.md) — Learn how to contribute`,
                `- 📋 [Content Standards](${repoUrl}/blob/main/AGENTS.MD) — Review the course structure and standards`,
                '',
                "If you'd like to implement this suggestion yourself, feel free to submit a Pull Request!"
              );
            } else {
              lines.push(
                `👋 你好 @${issueAuthor}，感谢你创建了这个 Issue！`,
                '',
                '维护者会尽快查看你的 Issue。以下是一些可能有用的资源：',
                '',
                `- 📖 [贡献指南](${repoUrl}/blob/main/CONTRIBUTING.md) — 了解项目规范`,
                `- 📋 [课程内容规范](${repoUrl}/blob/main/AGENTS.MD) — 查看课程质量标准`,
                `- 💬 [讨论区](${repoUrl}/discussions) — 进行开放性讨论`,
                '',
                '---',
                '',
                `👋 Hi @${issueAuthor}, thank you for creating this Issue!`,
                '',
                'Maintainers will review your Issue as soon as possible. Here are some resources that might be helpful:',
                '',
                `- 📖 [Contributing Guide](${repoUrl}/blob/main/CONTRIBUTING.md) — Learn about project conventions`,
                `- 📋 [Content Standards](${repoUrl}/blob/main/AGENTS.MD) — Review course quality standards`,
                `- 💬 [Discussions](${repoUrl}/discussions) — For open discussions`
              );
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n')
            });

            // 根据标题前缀添加标签 | Add labels based on title prefix
            try {
              if (isBugReport) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['bug']
                });
              } else if (isFeatureRequest) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['enhancement']
                });
              }
            } catch (e) {
              // 标签不存在时静默忽略 | Silently ignore if label doesn't exist
              core.warning(`Could not add label: ${e.message}`);
            }
