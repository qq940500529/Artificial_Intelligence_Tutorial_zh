# 将知识图谱可视化部署到 GitHub Pages
name: Deploy Knowledge Graph

on:
  push:
    branches: [main]
    paths:
      - '知识图谱可视化/**'
      - '00_高中复习/**'
      - '01_基础能力/**'
      - '02_核心原理/**'
      - '03_工程落地/**'
      - '04_持续研究/**'
      - 'AGENTS.MD'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild data.js from directory structure
        run: python 知识图谱可视化/scripts/build_data.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 知识图谱可视化

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
