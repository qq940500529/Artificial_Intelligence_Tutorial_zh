# 自动回复 Discussion | Auto-reply to Discussions
# 当新 Discussion 被创建时，自动发送中英双语欢迎消息
# When a new Discussion is created, automatically send a bilingual welcome message

name: Discussion Welcome Reply

on:
  discussion:
    types: [created]

permissions:
  contents: read
  issues: read
  discussions: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new discussion
        uses: actions/github-script@v7
        with:
          script: |
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            // --- Bot→人类 动态用户解析 | Dynamic bot-to-human user resolution ---
            let botMapping = {};
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/bot-user-mapping.json'
              });
              botMapping = JSON.parse(Buffer.from(data.content, 'base64').toString());
            } catch (e) {}

            async function resolveUser(login, type, resource) {
              if (type !== 'Bot' && !login.endsWith('[bot]')) return login;
              if (resource) {
                try {
                  const refs = [...(resource.body || '').matchAll(/#(\d+)/g)].map(m => +m[1]);
                  for (const num of refs) {
                    const { data: events } = await github.rest.issues.listEvents({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    const evt = events.findLast(e =>
                      e.event === 'assigned' && e.assignee?.login?.endsWith('[bot]')
                    );
                    if (evt?.actor && evt.actor.type !== 'Bot') return evt.actor.login;
                    const { data: linked } = await github.rest.issues.get({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    if (linked.user.type !== 'Bot') return linked.user.login;
                  }
                } catch (e) {}
                const ha = (resource.assignees || []).find(a => a.type !== 'Bot' && !a.login.endsWith('[bot]'));
                if (ha) return ha.login;
                if (resource.requested_reviewers) {
                  const hr = resource.requested_reviewers.find(r => r.type !== 'Bot' && !r.login.endsWith('[bot]'));
                  if (hr) return hr.login;
                }
              }
              return botMapping[login] || context.repo.owner;
            }
            // --- 解析结束 | End resolution ---

            const discussion = context.payload.discussion;
            const discussionAuthor = await resolveUser(
              discussion.user.login, discussion.user.type, discussion
            );

            const lines = [
              `👋 你好 @${discussionAuthor}，感谢你发起了这个讨论！`,
              '',
              '我们鼓励社区成员之间的交流与分享。以下是一些可能有用的资源：',
              '',
              `- 📖 [贡献指南](${repoUrl}/blob/main/CONTRIBUTING.md) — 了解如何参与项目贡献`,
              `- 📋 [课程内容规范](${repoUrl}/blob/main/AGENTS.MD) — 了解课程体系与规范`,
              `- 🐛 [提交 Issue](${repoUrl}/issues/new/choose) — 报告错误或提出建议`,
              '',
              '如果你的问题涉及课程内容的错误或改进建议，建议使用 Issue 模板提交，以便我们更好地跟踪和处理。',
              '',
              '---',
              '',
              `👋 Hi @${discussionAuthor}, thank you for starting this discussion!`,
              '',
              'We encourage communication and sharing among community members. Here are some helpful resources:',
              '',
              `- 📖 [Contributing Guide](${repoUrl}/blob/main/CONTRIBUTING.md) — Learn how to contribute to the project`,
              `- 📋 [Content Standards](${repoUrl}/blob/main/AGENTS.MD) — Learn about the course structure and standards`,
              `- 🐛 [Submit an Issue](${repoUrl}/issues/new/choose) — Report errors or suggest improvements`,
              '',
              'If your question involves content errors or improvement suggestions, we recommend using the Issue templates for better tracking.'
            ];

            const mutation = `mutation($discussionId: ID!, $body: String!) {
              addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                comment {
                  id
                }
              }
            }`;

            await github.graphql(mutation, {
              discussionId: context.payload.discussion.node_id,
              body: lines.join('\n')
            });
