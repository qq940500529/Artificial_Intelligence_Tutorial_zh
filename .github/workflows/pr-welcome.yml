# 自动回复 Pull Request | Auto-reply to Pull Requests
# 当新 PR 被创建时，自动发送中英双语欢迎消息和审查提醒
# When a new PR is created, automatically send a bilingual welcome message and review reminders

name: PR Welcome Reply

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome new PR
        uses: actions/github-script@v7
        with:
          script: |
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;

            // --- Bot→人类 动态用户解析 | Dynamic bot-to-human user resolution ---
            let botMapping = {};
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/bot-user-mapping.json'
              });
              botMapping = JSON.parse(Buffer.from(data.content, 'base64').toString());
            } catch (e) {}

            async function resolveUser(login, type, resource) {
              if (type !== 'Bot' && !login.endsWith('[bot]')) return login;
              if (resource) {
                try {
                  const refs = [...(resource.body || '').matchAll(/#(\d+)/g)].map(m => +m[1]);
                  for (const num of refs) {
                    const { data: events } = await github.rest.issues.listEvents({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    const evt = events.findLast(e =>
                      e.event === 'assigned' && e.assignee?.login?.endsWith('[bot]')
                    );
                    if (evt?.actor && evt.actor.type !== 'Bot') return evt.actor.login;
                    const { data: linked } = await github.rest.issues.get({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: num
                    });
                    if (linked.user.type !== 'Bot') return linked.user.login;
                  }
                } catch (e) {}
                const ha = (resource.assignees || []).find(a => a.type !== 'Bot' && !a.login.endsWith('[bot]'));
                if (ha) return ha.login;
                if (resource.requested_reviewers) {
                  const hr = resource.requested_reviewers.find(r => r.type !== 'Bot' && !r.login.endsWith('[bot]'));
                  if (hr) return hr.login;
                }
              }
              return botMapping[login] || context.repo.owner;
            }
            // --- 解析结束 | End resolution ---

            const pr = context.payload.pull_request;
            const prAuthor = await resolveUser(pr.user.login, pr.user.type, pr);

            const lines = [
              `👋 你好 @${prAuthor}，感谢你提交了这个 Pull Request！`,
              '',
              '维护者会尽快审查你的贡献。在等待审查期间，请确认以下事项：',
              '',
              '### 📋 自检清单 | Self-check Checklist',
              '',
              '#### 结构与命名 | Structure & Naming',
              '- [ ] 课程主文件使用与目录同名的 `.md` 文件（非 `README.md`）',
              '- [ ] 目录和文件命名符合规范（中文名 + 数字前缀）',
              '- [ ] 已删除对应的 `.gitkeep` 占位文件',
              '',
              '#### 内容质量 | Content Quality',
              '- [ ] 包含所有必需章节（前置知识、学习目标、正文、实践、练习、参考资料）',
              '- [ ] 采用叙事引导式行文',
              '- [ ] 术语首次出现标注中英文',
              '',
              '#### 排版规范 | Formatting',
              '- [ ] 行内公式 `$...$` 前后有空格（包括中文标点之后）',
              '- [ ] 独立行公式 `$$...$$` 前后有空行',
              '- [ ] `<details>` 内公式使用单行 `$$公式$$` 格式',
              '- [ ] 链接使用相对路径',
              '',
              '#### 提交规范 | Commit Conventions',
              '- [ ] 提交信息格式：`[阶段编号/主题模块] 动作：知识点名称`',
              '- [ ] 未修改 `知识图谱可视化/` 目录',
              '',
              `> 📖 详细规范请参阅 [贡献指南](${repoUrl}/blob/main/CONTRIBUTING.md) 和 [AGENTS.MD](${repoUrl}/blob/main/AGENTS.MD)。`,
              '',
              '---',
              '',
              `👋 Hi @${prAuthor}, thank you for submitting this Pull Request!`,
              '',
              'Maintainers will review your contribution as soon as possible. While waiting for review, please confirm the checklist above.',
              '',
              `> 📖 For detailed standards, see the [Contributing Guide](${repoUrl}/blob/main/CONTRIBUTING.md) and [AGENTS.MD](${repoUrl}/blob/main/AGENTS.MD).`
            ];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: lines.join('\n')
            });
